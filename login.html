<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>Login</title>
</head>

<body>
    <header>
        <nav class="area-navegacao">
            <img class="logo" src="img/logo-tia-sonia.png" alt="Logo do site" width="150px">
            <ul>
                <li><a class="icones" href="index.html"><i class="fa-solid fa-house-chimney"></i></a></li>
                <li><a class="icones" href="index.html"><i class="fa-solid fa-scissors"></i></a></li>
                <li><a class="icones" href="#"><i class="fa-solid fa-cart-arrow-down"></i></a></li>
                <li><a class="icones" href="cadastro.html"><i class="fa-solid fa-user-gear"></i></a></li>
            </ul>
        </nav>
    </header>
    <main>
        <article class="area-cadastro">
            <section class="area-titulo">
                <h1>Área de Login</h1>
            </section>
            <section class="area-formulario">
                <form action="#" class="form-cadastro" id="form-logar">

                    <div class="area-acesso formatacao">
                        <div class="email titulo-campo">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="Digite seu email" required>
                        </div>
                        <div class="senha titulo-campo">
                            <label for="senha">Senha</label>
                            <input type="password" id="senha" placeholder="●●●●●●●●" required>
                            <a href="#" class="link-login">Esqueceu sua senha ?</a>
                        </div>
                    </div>

                    <div class="area-botao">
                        <button type="submit" id="botao-cadastrar" > Acessar </button>

                        <a href="cadastro.html" class="link-login">Ainda não possuo uma conta. Cadastrar agora !</a>
                    </div>
                </form>
            </section>

        </article>
    </main>
    <footer class="rodape">
        <nav class="nav-rodape">
            <p>A Tia Sônia agradece sua visita.Ficou alguma dúvida? Entre em contato com ela <a
                    href="https://w.app/bordados-tia-sonia" target="_blank">por aqui</a></p>
            <p>Todos os direitos reservados ©</p>
        </nav>
    </footer>
    
    <script src="cadastro-login.js"></script>

</body>

</html>
