<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>bordados da tia sonia</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav>
            <img src="imagem/logo-tia-sonia.png" alt="logo-tia-sonia" width=100px>
            <ul>
                <li><a class="icones" href=""><i class="fa-solid fa-house"></i></a></li>
                <li><a class="icones" href=""><i class="fa-solid fa-cart-shopping"></i></a></li>
                <li><a class="icones" href=""><i class="fa-solid fa-pen-ruler"></i></a></li>
                <li><a class="icones" href=""><i class="fa-solid fa-user"></i></a></li>
            </ul>
        </nav>
    </header>
    <main>
        <article class="area__banner">
            <section id="banner">
                <img src="imagem/banner 2.png" alt="banner de bordados" id="banner__image">
            </section>
            <section id="reservas">
                <h2 id="reservas__titulos">vagas na agenda disponiveis:3 disponiveis</h2>
                <button id="reservas__botao">reservas vagas</button>
            </section>
        </article>
        <article class="area__sobre">
            <section class="sobre">
                <h1 class="sobre__titulo">conheca a tia sonia</h1>
                <p class="sobre__texto">A tia sonia estar super feliz em ter voce por aqui.Ela bordas todos os dias e ama oque faz, se vc gostas de bordados comoo ela,ou conhece alguem que amaria de recer um bordado,visite o seu castalogo e faca uma reserva.</p>
            </section>
            <section class="sobre">
                <img class="sobre__foto" src="imagem/tia-sonia.png" alt="mulher com o cabelos grisalhos em um jardim de rosas.">

            </section>
        </article>
    </main>

</body>

</html>
